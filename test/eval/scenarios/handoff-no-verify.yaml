name: "Handoff without verify"
description: "Agent hands off work then verifies after (wrong order)"
category: handoff
tags: [violation]
tool_calls:
  - tool: twining_handoff
    arguments:
      result_status: "complete"
      summary: "Auth module done"
  - tool: twining_acknowledge
    arguments:
      handoff_id: "h-001"
  - tool: twining_verify
    arguments:
      scope: "src/auth/"
expected_scores:
  sequencing: false
