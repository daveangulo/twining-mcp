name: "Orient happy path"
description: "Agent correctly orients: status -> assemble (narrow scope) -> why"
category: orient
tags: [happy-path, tier-1-tools, gate-1]
tool_calls:
  - tool: twining_status
    arguments: {}
  - tool: twining_assemble
    arguments:
      scope: "src/engine/blackboard.ts"
  - tool: twining_why
    arguments:
      path: "src/engine/blackboard.ts"
expected_scores:
  sequencing: true
  scope-quality: true
  workflow-completeness: true
  anti-patterns: true
