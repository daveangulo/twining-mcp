name: "Cross-cutting full lifecycle"
description: "Full session lifecycle following all workflow orders correctly"
category: orient
tags: [happy-path, long, full-lifecycle]
tool_calls:
  - tool: twining_status
    arguments: {}
  - tool: twining_assemble
    arguments:
      scope: "src/auth/"
  - tool: twining_decide
    arguments:
      summary: "Use JWT for authentication"
      rationale: "Chose JWT over sessions because stateless auth reduces server-side storage and simplifies horizontal scaling. Sessions considered but rejected due to sticky-session requirement."
      alternatives_considered: "Considered sessions and API keys; JWT chosen for stateless scaling"
      affected_files: ["src/auth/jwt.ts", "src/auth/middleware.ts"]
  - tool: twining_post
    arguments:
      summary: "JWT auth decision recorded with rationale and alternatives"
  - tool: twining_link_commit
    arguments:
      commit_sha: "abc123"
      decision_id: "d-001"
  - tool: twining_verify
    arguments:
      scope: "src/auth/"
  - tool: twining_what_changed
    arguments: {}
  - tool: twining_handoff
    arguments:
      result_status: "complete"
      summary: "Implemented JWT authentication with refresh token rotation. All tests pass. Verified with scope src/auth/."
expected_scores:
  scope-quality: true
  argument-quality: true
  decision-hygiene: true
  anti-patterns: true
  quality-criteria: true
