name: "Decide fire and forget"
description: "Agent makes a decision with assemble but never follows up with link_commit"
category: decide
tags: [violation, tier-1-tools]
tool_calls:
  - tool: twining_assemble
    arguments:
      scope: "src/auth/"
  - tool: twining_decide
    arguments:
      summary: "Use JWT for authentication"
      rationale: "Chose JWT over sessions because stateless auth reduces server-side storage and simplifies horizontal scaling."
      alternatives_considered: "Considered sessions and API keys; JWT chosen for stateless scaling"
expected_scores:
  decision-hygiene: false
  anti-patterns: false
